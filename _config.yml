# Welcome to Jekyll!
# Basic Site Settings
locale                    : "en-US"
site_theme                : "mint"
title                     : "Diana-Patricia Danciu"
title_separator           : "|"
name                      : &name "Diana-Patricia Danciu"
description               : &description "Dr. Diana-Patricia Danciu is a Mathematical Systems Biologist and Postdoctoral Researcher at Heidelberg University. Specializing in mechanistic modeling, stochastic systems, and data-driven systems biology to decode neural stem cell dynamics, tissue regeneration, and glioblastoma cancer progression."
url                       : "https://dpdanciu.github.io"
baseurl                   : ""
repository                : "dpdanciu/dpdanciu.github.io"

# Site Author
author:
  avatar           : "pozaSticker_Diana.png"
  name             : "Diana-Patricia Danciu"
  pronouns         : 
  bio              : "Mathematical systems biologist developing mechanistic models to decipher regulatory principles of stem cell dynamics in health and disease."
  location         : "Heidelberg, Germany"
  employer         : "Heidelberg University"
  uri              : 
  email            : "dpdanciu@math.uni-heidelberg.de" 

  # Academic websites
  academia         : 
  arxiv            : 
  googlescholar    : "https://scholar.google.com.au/citations?hl=en&user=Bzm9x2sAAAAJ"
  inspire-hep      : 
